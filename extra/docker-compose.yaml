services:
  db:
    build: .
    environment:
      POSTGRES_DB: b2b_proyecto
      POSTGRES_USER: "owner"
      POSTGRES_PASSWORD: "123456"
    volumes:
      - pg_data:/var/lib/postgresql
      - ./start-scripts/db_schema.sql:/docker-entrypoint-initdb.d/db_schema.sql
      - ./start-scripts/quartz.sql:/docker-entrypoint-initdb.d/quartz.sql
    container_name: b2b_database
    ports:
      - "5432:5432"

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile.spring
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/b2b_proyecto
      SPRING_DATASOURCE_USERNAME: owner
      SPRING_DATASOURCE_PASSWORD: "123456"
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pg_data:
