services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: final
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: NuevaContraseñaSegura123!
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.spring
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      APP_BASE_URL: https://santiarifer.nicolascresposu.com

volumes:
  pgdata:
