name: Deploy Backend

on:
  push:
    branches: [backend-b2b]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy backend to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-v2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-v2-

      - name: Build JAR (prod profile)
        run: mvn clean package -Denv=prod -DskipTests

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 74.163.80.99 >> ~/.ssh/known_hosts

      - name: Upload JAR to server
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            B2B-api/target/*.jar \
            azureadmin@74.163.80.99:~/Backend-B2B/extra/B2B-api-0.0.1-SNAPSHOT.jar

      - name: Rebuild and restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.163.80.99
          port: 22
          username: azureadmin
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/Backend-B2B/extra
            sudo docker compose build spring-app
            sudo docker compose up -d spring-app
            sudo docker compose ps
