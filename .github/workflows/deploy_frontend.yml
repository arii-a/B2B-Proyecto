name: Deploy Frontend

on:
  push:
    branches: [frontend-b2b]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy frontend to production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 74.163.80.99 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          tar -czf dist.tar.gz -C dist .
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            dist.tar.gz \
            azureadmin@74.163.80.99:/tmp/dist.tar.gz
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            azureadmin@74.163.80.99 \
            "sudo rm -rf /var/www/html/* && sudo tar -xzf /tmp/dist.tar.gz -C /var/www/html/ && rm /tmp/dist.tar.gz"

      - name: Reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 74.163.80.99
          port: 22
          username: azureadmin
          key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          script: sudo systemctl reload nginx
